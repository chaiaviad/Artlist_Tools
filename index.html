<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artlist Tools</title>
<style>
  :root{
    --bg:#0c0c0e; --card:#17171b; --line:#2a2a32; --txt:#f4f4f6; --muted:#9a9aa6; --accent:#f8da1f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:
     radial-gradient(900px 500px at 80% -10%, rgba(248,218,31,.10), transparent 60%),
     radial-gradient(700px 500px at 0% 110%, rgba(248,218,31,.06), transparent 55%),
     var(--bg);
     color:var(--txt);font-family:"Segoe UI",Arial,Helvetica,sans-serif}
  .wrap{max-width:880px;margin:0 auto;padding:72px 24px 80px;display:flex;flex-direction:column;gap:40px}
  .brand{display:flex;align-items:flex-end;justify-content:center;direction:ltr;gap:6px}
  .brand img{height:30px;width:auto;display:block}
  .brand b{color:var(--txt);font-weight:600;font-size:18px;letter-spacing:0;line-height:1}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
  .card{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;min-height:120px;
     background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 22px;
     text-decoration:none;color:inherit;font-size:20px;font-weight:700;text-align:center;
     transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .beta{font-size:11px;font-weight:800;letter-spacing:.5px;color:#111;background:var(--accent);
     border-radius:999px;padding:3px 9px;text-transform:uppercase}
  .pc{font-size:11px;font-weight:800;letter-spacing:.5px;color:#fff;background:#444;
     border-radius:999px;padding:3px 9px;text-transform:uppercase}
  .card-split{display:flex;flex-direction:column;align-items:center;gap:14px;min-height:120px;
     background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 22px 18px;
     text-align:center;transition:border-color .15s ease}
  .card-split:hover{border-color:var(--accent)}
  .card-split .title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
  .card-split .btns{display:flex;gap:10px}
  .card-split .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:10px;
     background:#222;border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:700;
     text-decoration:none;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease}
  .card-split .btn:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .card-split .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="artlist-logo.png" alt="Artlist">
      <b>Tools</b>
    </div>
    <main class="grid" id="grid"></main>
  </div>

<script>
// internal order only (al). display = product name only.
const TOOLS = [
  { al:"AL-04", folder:"Thumbnail_Banner_Maker", title:"Thumbnail & Banner Maker" },
  { al:"AL-05", folder:"Collab_Maker",            title:"Collab Maker" },
  { al:"AL-08", title:"Companion", beta:true, split:[
      { label:"Windows", file:"Companion/WIN/Companion.exe" },
      { label:"Mac", file:"Companion/MAC/INSTALL_MAC.command" }
  ]},
];
const grid=document.getElementById("grid");
const esc=s=>s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
TOOLS.slice().sort((a,b)=>a.al.localeCompare(b.al)).forEach(t=>{
  if(t.split){
    const div=document.createElement("div");
    div.className="card-split";
    div.innerHTML=`<div class="title"><span>${esc(t.title)}</span>${t.beta?`<span class="beta">Beta</span>`:""}</div>`
      +`<div class="btns">${t.split.map(s=>`<a class="btn" href="${esc(s.file)}" download>${esc(s.label)}</a>`).join("")}</div>`;
    grid.appendChild(div);
    return;
  }
  const a=document.createElement("a");
  a.className="card"; a.href=t.download?t.file:t.folder+"/";
  if(t.download) a.setAttribute("download","");
  a.innerHTML=`<span>${esc(t.title)}</span>`+(t.beta?`<span class="beta">Beta</span>`:"")+( t.pc?`<span class="pc">PC Only</span>`:"");
  grid.appendChild(a);
});
</script>
</body>
</html>
